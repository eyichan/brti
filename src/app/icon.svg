<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark background -->
  <rect width="64" height="64" rx="14" fill="#1c1210"/>
  <!-- Brain outline -->
  <path d="M32 8C20 8 12 16 12 26c0 4 1.5 7.5 4 10.5C18 39 19 42 19 46v2a2 2 0 002 2h22a2 2 0 002-2v-2c0-4 1-7 3-9.5 2.5-3 4-6.5 4-10.5C52 16 44 8 32 8z" stroke="#f97316" stroke-width="3" fill="none"/>
  <!-- Brain center line -->
  <path d="M32 12v34" stroke="#f97316" stroke-width="2" stroke-dasharray="4 3" opacity="0.5"/>
  <!-- Left brain wrinkles -->
  <path d="M18 22c4-1 7 1 8 4M16 30c5 0 8 2 9 5" stroke="#fb923c" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Right brain wrinkles -->
  <path d="M46 22c-4-1-7 1-8 4M48 30c-5 0-8 2-9 5" stroke="#fb923c" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Melting drips (brainrot effect) -->
  <path d="M24 50v6a3 3 0 006 0v-6" stroke="#f97316" stroke-width="2" fill="#f97316" opacity="0.7"/>
  <path d="M34 50v8a3 3 0 006 0v-8" stroke="#f97316" stroke-width="2" fill="#f97316" opacity="0.5"/>
  <!-- Glitch lines -->
  <rect x="10" y="25" width="8" height="2" rx="1" fill="#eab308" opacity="0.6"/>
  <rect x="46" y="31" width="10" height="2" rx="1" fill="#eab308" opacity="0.4"/>
  <!-- Spark -->
  <circle cx="38" cy="18" r="2" fill="#eab308"/>
</svg>
